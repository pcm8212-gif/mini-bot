<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Ad Reward System - User Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .header-panel {
            background: linear-gradient(135deg, #2ecc71, #f39c12);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #000;
        }

        .user-info {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #2ecc71;
        }

        .user-info p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #ccc;
        }

        .highlight {
            color: #2ecc71;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .progress-section {
            margin-bottom: 25px;
        }

        .progress-bar {
            background: #333;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            background: #2ecc71;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-watch { background-color: #2ecc71; color: white; }
        .btn-start-auto { background-color: #e67e22; color: white; }
        .btn-stop-auto { background-color: #c0392b; color: white; }
    </style>
    
    <div id="monetag-script-container"></div>
</head>
<body>

<div class="app-container">
    <div class="header-panel">
        Premium Ad Reward System
    </div>

    <div class="user-info">
        <p><strong>Welcome,</strong> User9666</p>
        <p><strong>User ID:</strong> #USR-25071</p>
        <p><strong>Your Balance:</strong> <span class="highlight" id="user-balance">0.00</span> TK</p>
    </div>

    <div class="progress-section">
        <span style="font-size: 0.85rem; color: #aaa;" id="progress-text">Progress to Bonus: 0%</span>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-watch" onclick="watchAd()">Watch Ad (+0.50)</button>
        <button class="btn btn-start-auto" onclick="startAutoAds()">Auto Show Ads</button>
        <button class="btn btn-stop-auto" onclick="stopAutoAds()">Stop Auto Ads</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Your Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCnGEF2JnDx3XxGRqznOQUwMa2dC3RLF2U",
        authDomain: "mini-bot-6448a.firebaseapp.com",
        databaseURL: "https://mini-bot-6448a-default-rtdb.firebaseio.com",
        projectId: "mini-bot-6448a",
        storageBucket: "mini-bot-6448a.firebasestorage.app",
        messagingSenderId: "956299996777",
        appId: "1:956299996777:web:aef82a9ada47f72a47fcf8",
        measurementId: "G-Y1E1B2Y6HM"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userData = {
        balance: 0.00,
        views: 0,
        clicks: 0,
        zoneId: "8888888"
    };

    let autoAdInterval = null;
    let isScriptLoaded = false;

    // Firebase থেকে ডাটা রিয়েল-টাইম লোড করা
    database.ref('mini_bot_user').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            userData = data;
            updateUI();
            
            // জোন আইডি পরিবর্তন হলে Monetag স্ক্রিপ্ট নতুন করে লোড হবে
            if (!isScriptLoaded || document.getElementById('monetag-script-container').dataset.zone !== userData.zoneId) {
                loadMonetagScript(userData.zoneId);
            }
        } else {
            // ডাটাবেজ খালি থাকলে ইনিশিয়াল ডাটা সেট হবে
            database.ref('mini_bot_user').set(userData);
        }
    });

    function updateUI() {
        document.getElementById('user-balance').innerText = Number(userData.balance).toFixed(2);
        
        let progress = Math.min((userData.views % 10) * 10, 100); 
        document.getElementById('progress-fill').style.width = progress + '%';
        document.getElementById('progress-text').innerText = `Progress to Bonus: ${progress}%`;
    }

    function loadMonetagScript(zoneId) {
        const container = document.getElementById('monetag-script-container');
        container.innerHTML = ""; 
        container.dataset.zone = zoneId;

        if(!zoneId || zoneId === "8888888") return;

        let script = document.createElement('script');
        script.src = `https://alwingulla.com/zone/3e/6c/${zoneId}/zone.js`; 
        script.async = true;
        container.appendChild(script);
        isScriptLoaded = true;
    }

    function watchAd() {
        if (!userData.zoneId || userData.zoneId.trim() === "" || userData.zoneId === "8888888") {
            alert("Please set a valid Monetag Zone ID in Admin Panel first!");
            return;
        }

        alert("Loading Monetag Ad (Zone ID: " + userData.zoneId + ")...");
        
        // ভিউ ও ব্যালেন্স বাড়িয়ে ফায়ারবেসে সেভ করা
        let newViews = (userData.views || 0) + 1;
        let newBalance = (userData.balance || 0) + 0.50; 
        let newClicks = userData.clicks || 0;

        if(Math.random() > 0.5) {
            newClicks += 1;
        }

        database.ref('mini_bot_user').update({
            views: newViews,
            balance: newBalance,
            clicks: newClicks
        });
    }

    function startAutoAds() {
        if (autoAdInterval) {
            alert("Auto Ads is already running!");
            return;
        }
        alert("Auto Ads started! It will load an ad every 10 seconds.");
        autoAdInterval = setInterval(() => {
            watchAd();
        }, 10000); 
    }

    function stopAutoAds() {
        if (autoAdInterval) {
            clearInterval(autoAdInterval);
            autoAdInterval = null;
            alert("Auto Ads has been stopped.");
        } else {
            alert("Auto Ads is not running.");
        }
    }
</script>

</body>
</html>
